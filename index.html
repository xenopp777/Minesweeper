<!DOCTYPE html>
<html>
    <head>
        <!-- A JavaScript remake of classic Minesweeper
        ---- Written by Zoie D, 5/30/26 -->
        <meta charset="UTF-8">
        <title>Minesweeper</title>
        <link rel="stylesheet" href="./src/css/styles.css">
    </head>
    <body>

        <div id="quote-container"></div>

        <div id="container" class="easy-mode">
            <section class="score-board">
                <div id="mines-left" class="scrn">000</div>
                <button id="reset"></button>
                <div id="timer" class="scrn">000</div>
            </section>
            <section id="play-grid">
            </section>
            <section id="gamemode" class="difficulty">
                <button id="easy" class="btn">Easy</button>
                <button id="mid" class="btn">Intermediate</button>
                <button id="expert" class="btn">Expert</button>
            </section>
        </div>

        <hr>
        <div id="highscores">
            <div id="h3-wrapper" class="txt-wrapper">
                <h3>Best Times</h3>
            </div>
            <div id="hs-inner" class="txt-wrapper">
                <p>Easy: <span id="easy-score">--</span></p>
                <p>Intermediate: <span id="mid-score">--</span></p>
                <p>Expert: <span id="expert-score">--</span></p>
            </div>
        </div>

        <script type="module" src="./src/js/index.js"></script>
    </body>
</html>
